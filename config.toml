# firehose configuration
#

[paths]
# Where firehose keeps its data files (arxiv.txt, readlog.txt, scanlog.jsonl).
# A relative path resolves from the directory holding this config file, so
# firehose finds the same data wherever it is run from; ~ is expanded.
# Override for a single run with --data-dir (resolved from the current dir).
data = "data"
# Where grabbed PDFs are saved (gitignored; filed under <YYYY-MM>/ subdirs).
# A relative path resolves from the directory holding this config file; ~ is
# expanded.
# Override for a single run with --download-dir (resolved from the current dir).
downloads = "downloads"

[scan]
# Papers submitted on or before this date are treated as "old" and dropped by
# the default `sample` scan (`sample --no-modern` keeps them); roughly when I
# started using firehose. Written as a bare date -- TOML parses it as a date.
modern_cutoff = 2025-04-15

[arxiv]
